name = "ct-assistant"
main = "worker.ts"
compatibility_date = "2026-01-01"

# Public origin allowed to call this Worker.
# Override per-environment with `wrangler deploy --var ALLOWED_ORIGIN:...`.
[vars]
ALLOWED_ORIGIN = "https://stangandaho.github.io"

# Bundle ct_knowledge.txt as an importable text module.
# Regenerate the file with: Rscript data-raw/build_assistant_kb.R
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

# Workers AI — free open-model inference (embeddings + chat). No API key.
# https://developers.cloudflare.com/workers-ai/platform/pricing/
[ai]
binding = "AI"

# Vectorize — semantic search index over the ct docs (free tier).
# Create it once with:
#   npx wrangler vectorize create ct-docs --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "ct-docs"

# KV namespace used for per-IP rate limiting.
# Create it once with:  wrangler kv namespace create RATE_LIMIT
# then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "c3971f2a1d9944abb7e54b8436a85bae"

# REINDEX_KEY is a secret guarding POST /reindex. Set it with:
#   npx wrangler secret put REINDEX_KEY
# (No ANTHROPIC_API_KEY needed — Workers AI is used instead.)
